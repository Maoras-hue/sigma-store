<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - Seller Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .product-info {
            padding: 1rem;
        }
        .delete-btn {
            background: #e05a2a;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        body.dark .product-card {
            background: #1e1e1e;
            border-color: #333;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="logo">σ sigma</a>
    <div class="nav">
        <a href="index.html">shop</a>
        <a href="about.html">about</a>
        <a href="blog.html">blog</a>
        <a href="privacy.html">privacy</a>
        <a href="wishlist.html">wishlist</a>
        <a href="terms.html">terms</a>
        <a href="refund.html">refund</a>
        <a href="seller-dashboard.html">seller</a>
    </div>
    <button class="dark-toggle" id="darkToggle">🌙</button>
    <a href="cart.html" class="cart-btn">cart (<span id="cartCount">0</span>)</a>
</div>

<main>
    <div class="container">
        <h2> My Products</h2>
        <button onclick="location.href='seller-add-product.html'" style="background: #111; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 1rem;">➕ Add New Product</button>
        <div id="productsGrid" class="products-grid">Loading...</div>
    </div>
</main>

<footer>
    <p>sigma studio — mardan, pk</p>
</footer>

<script>
    const API_URL = 'http://127.0.0.1:3000';
    
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('sigma_cart') || '[]');
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        const badge = document.getElementById('cartCount');
        if (badge) badge.innerText = total;
    }
    
    document.getElementById('darkToggle')?.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('darkToggle').innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('sigma_dark', isDark);
    });
    
    if (localStorage.getItem('sigma_dark') === 'true') {
        document.body.classList.add('dark');
        document.getElementById('darkToggle').innerText = '☀️';
    }
    
    async function loadProducts() {
        try {
            const response = await fetch(`${API_URL}/api/seller/products`, {
                credentials: 'include'
            });
            
            if (response.ok) {
                const data = await response.json();
                const grid = document.getElementById('productsGrid');
                
                if (data.products.length === 0) {
                    grid.innerHTML = '<p style="text-align: center;">No products yet. <a href="seller-add-product.html">Add your first product</a></p>';
                } else {
                    grid.innerHTML = data.products.map(p => `
                        <div class="product-card">
                            <img src="${API_URL}/uploads/${p.image}" onerror="this.src='https://placehold.co/300x200'">
                            <div class="product-info">
                                <h3>${p.name}</h3>
                                <p>$${p.price}</p>
                                <p>Stock: ${p.stock}</p>
                                <button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button>
                            </div>
                        </div>
                    `).join('');
                }
            } else {
                window.location.href = 'seller-signup.html';
            }
        } catch(e) {
            console.error('Error:', e);
        }
    }
    
    async function deleteProduct(productId) {
        if (confirm('Are you sure you want to delete this product?')) {
            const response = await fetch(`${API_URL}/api/seller/products/${productId}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            
            if (response.ok) {
                loadProducts();
            } else {
                alert('Failed to delete product');
            }
        }
    }
    
    loadProducts();
    updateCartCount();
</script>
</body>
</html>
